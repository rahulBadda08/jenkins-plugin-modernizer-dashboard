name: Syncing Jenkins Plugin Ecosystem Data

on:
  schedule:
    - cron: '0 0 * * *' # Execute automatically exactly at Midnight UTC every single day
  workflow_dispatch:    # Also allow Jenkins maintainers to click a "Run Action" button manually if they want an instant refresh

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Execute Autonomous Jenkins Engine Fetcher
        run: node scripts/fetchData.mjs
        
      - name: Automatically Commit Fresh Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/all_plugins.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): nightly autonomous refresh of jenkins ecosystem metadata" && git push)
