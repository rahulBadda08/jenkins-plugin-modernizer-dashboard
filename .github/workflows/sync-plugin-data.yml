name: Sync Data & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *' # Run at Midnight UTC every day
  workflow_dispatch:    # Allow manual trigger by maintainers

# Grant GITHUB_TOKEN permissions to deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── JOB 1: Fetch latest plugin data from metadata-plugin-modernizer ──
  fetch-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch Jenkins Plugin Ecosystem Data
        run: node scripts/fetchData.mjs

      - name: Commit Fresh Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/all_plugins.json
          if git diff --staged --quiet; then
            echo "No data changes detected — skipping commit."
          else
            git commit -m "chore(data): nightly autonomous refresh of jenkins ecosystem metadata"
            git push
          fi

  # ── JOB 2: Build Vite app and deploy to GitHub Pages ──
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: fetch-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository (with latest committed data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Production Site
        # Use vite build directly to skip the prebuild data fetch
        # (data was already fetched and committed in job 1)
        run: npx vite build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
