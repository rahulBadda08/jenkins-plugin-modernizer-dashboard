name: Deploy Dashboard to GitHub Pages

on:
  # This triggers a new live deployment every time the nightly-scraper updates the JSON database 
  # or when a new code commit is pushed to the main branch.
  push:
    branches: ["main"]
  workflow_dispatch:

# Give permissions to the GITHUB_TOKEN to write to the Pages hosting environment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Ecosystem Packages
        run: npm ci

      - name: Compile React Application
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Web Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
